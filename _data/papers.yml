    title: "Cerebellar circuit computations for predictive motor control"
    authors: "<b>KP Nguyen</b> and AL Person"
    journal: "Nature Reviews Neuroscience"
    volume: ""
    year: 2025
    url: https://www.nature.com/articles/s41583-025-00936-z
    image: Nguyen2025
    imagetype: png
    briefly: "Here we review evidence for and against the hypothesis that the cerebellum learns basic associative feedforward control policies to speed up motor control and learning. We contrast and link this feedforward control framework with another prominent set of theories proposing that the cerebellum computes internal models. Ultimately, we suggest that the cerebellum may implement control through mechanisms that resemble internal models but involve model-free implicit mappings of high-dimensional sensorimotor contexts to motor output."
    summary: ""
    highlight: true
