    title: "The indirect pathway of the basal ganglia promotes transient punishment but not motor suppression "
    authors: "BR Isett*, <b>KP Nguyen*</b>, JC Schwenk, JR Yurek, CN Snyder, MV Vounatsos, KA Adegbesan, U Ziausyte, AH Gittis"
    journal: "Neuron"
